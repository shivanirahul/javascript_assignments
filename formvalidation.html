<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
    <script src="validation.js"></script>
</head>
<body>

<h2>Student Registration Form</h2>

<form name="myForm" onsubmit="return validateForm()">

    First Name:
    <input type="text" id="fname"><br><br>

    Last Name:
    <input type="text" id="lname"><br><br>

    Date of Birth:

    <select id="day">
        <option value="">Date</option>
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
        <option>6</option>
        <option>7</option>
        <option>8</option>
        <option>9</option>
        <option>10</option>
        <option>11</option>
        <option>12</option>
        <option>13</option>
        <option>14</option>
        <option>15</option>
        <option>16</option>
        <option>17</option>
        <option>18</option>
        <option>19</option>
        <option>20</option>
        <option>21</option>
        <option>22</option>
        <option>23</option>
        <option>24</option>
        <option>25</option>
        <option>26</option>
        <option>27</option>
        <option>28</option>
        <option>29</option>
        <option>30</option>
        <option>31</option>
    </select>

    <select id="month">
        <option value="">Month</option>
        <option>January</option>
        <option>February</option>
        <option>March</option>
        <option>April</option>
        <option>May</option>
        <option>June</option>
        <option>July</option>
        <option>August</option>
        <option>September</option>
        <option>October</option>
        <option>November</option>
        <option>December</option>
    </select>

    <select id="year">
        <option value="">Year</option>
        <option>2000</option>
        <option>2001</option>
        <option>2002</option>
        <option>2003</option>
        <option>2004</option>
        <option>2005</option>
        <option>2006</option>
    </select>

    <br><br>

    Name of Father:
    <input type="text" id="father"><br><br>

    Name of Mother:
    <input type="text" id="mother"><br><br>

    Gender:
    <input type="radio" name="gender" value="Male"> Male
    <input type="radio" name="gender" value="Female"> Female
    <input type="radio" name="gender" value="Other"> Other
    <br><br>

    Nationality:
    <select id="nationality">
        <option value="">Select</option>
        <option>India</option>
        <option>USA</option>
        <option>UK</option>
        <option>Australia</option>
    </select>
    <br><br>

    Course:
    <select id="course">
        <option value="">Select</option>
        <option>B.Tech</option>
        <option>M.Tech</option>
        <option>MCA</option>
        <option>M.Phil</option>
        <option>Ph.D</option>
    </select>
    <br><br>

    Specialization:
    <select id="specialization">
        <option value="">Select</option>
        <option>CSE</option>
        <option>ECE</option>
        <option>ME</option>
        <option>CE</option>
    </select>
    <br><br>

    Notes:<br>
    <textarea id="notes" rows="5" cols="40"></textarea>
    <br><br>

    <input type="submit" value="Submit">

</form>

</body>
</html>
